name: Docker Publish

on:
  workflow_dispatch:
  schedule:
    - cron: "0 20 * * *"

permissions:
  contents: read
  packages: write

env:
  UPSTREAM_REPOSITORY: 4thfever/cultivation-world-simulator
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/cultivation-world-simulator

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout image build repo
        uses: actions/checkout@v4
        with:
          path: image-repo

      - name: Checkout upstream source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.UPSTREAM_REPOSITORY }}
          ref: main
          path: source

      - name: Read upstream revision
        id: upstream
        run: |
          echo "sha=$(git -C source rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "short_sha=$(git -C source rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: source
          file: image-repo/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:upstream-${{ steps.upstream.outputs.short_sha }}
          labels: |
            org.opencontainers.image.title=cultivation-world-simulator
            org.opencontainers.image.description=Single-container build of 4thfever/cultivation-world-simulator
            org.opencontainers.image.source=https://github.com/${{ env.UPSTREAM_REPOSITORY }}
            org.opencontainers.image.revision=${{ steps.upstream.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
